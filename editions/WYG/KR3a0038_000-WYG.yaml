body:
  text: 提要省心襍言一卷儒家類臣等謹案省心襍言一卷宋李邦獻撰邦獻懐州人太宰邦彦之弟官至直敷文閣是書在宋有臨安刋本題為林逋撰或又以為尹焞所撰至宋濂跋其書則謂逋固未嘗著焞亦因和靖之號偶同而誤皆非其實而王佖所編朱子語録續類内有省心録乃沈道原作之文必有所據當定為沈本陶宗儀説郛録其數條仍署為林逋所作迄無定論今考永樂大典具載是書共二百餘條盖依宋時槧本全帙録入前有祁寛鄭望之沈濬汪應辰王大實五序後有馬藻項安世樂章三跋并有邦獻孫耆岡及四世孫景初跋三首皆謂此書邦獻所作耆岡且言曽見手稿而辨世所稱林逋之非其説出于李氏子孫自屬不誣又考王安禮為沈道原作墓誌具列所著詩傳論語解等書並無省心襍言之名足證確非道原作宋濂遽因朱子語録定為道原其亦考之未審矣其書切近簡要質而能該於範世勵俗之道頗有發明謹釐正舛誤定為李氏之書而考證其異同如右乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀省心雜言原敘夫入德之門莫大乎知知斯能至知而不至者有矣未有不知而能至者也是以教雖多術一言以蔽之曰知故有志於天下國家者亦以致知為本寓直敷文閣領天台祠事河内李公知而至之者昔獲見之於䕫峽今三十年公日以通顯分符將指歴官中外至八易使節凡可以利民為國有知必為嘗因將漕帝畿數被召對竭忠以告上省費以紓民力行所知不少遜避故於仕已而無喜慍俯仰而無愧怍然以是受知於君亦以是取異於世其表著於時者如是有松楸在巴蜀將歸過九江以省心雜言一編相示皆平昔銘諸座右者曰毎患知之弗至有得于心輙榜之壁以自警兒輩録而藏之積之久至如此雖然其敢示他人哉姑欲付子孫以見吾志云耳於戲今而後廼知公之表著於時者之所自也其多至數十百章旁見雜出從容中道無所不用其極非明於憂患與故知至而至之者不能如已試之醫方已儲之寳聚盍廣其施俾人得而知誠意正心推之以及於天下國家是廼竭盡所知報上化俗之一端而亦公所當任也紹興庚辰八月初吉廬阜老圃祁寛謹序見性自悟門入者不同十妷以士舉訓兒孫雜言相示敷闡經子與先聖道不悖惜乎桂林地下先生不親見之丙子春林下老人鄭望之書仲尼之學至今光明碩大者曾子傳之於無窮也曽子之學自一日三省其身為本三審也非數也後世讀之不詳不可不辯此省心子之意也因閲雜言乃表而出之三十年孟冬旦吳興沈濬題此心之用與天地相為無窮而或者梏於區區之形體受役於物恬不知反以其未之省也提刑敷文平居訓飭其家言雖不一總而名之曰省心所以遺子孫者豈不大哉丙戌正月上旬玉山汪應辰書敷文以家訓一冊見示名以省心雜言書曰人心惟危道心惟微惟精惟一允執厥中又曰作德心逸日休作偽心勞日拙所謂省心者防危精微以復其初屛偽進德以臻其至如斯而已戊子暮春掲陽王大寳書

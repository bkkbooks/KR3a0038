body:
  text: 省心雜言宋李邦獻撰簡言擇交可以無悔吝可以免憂辱無瑕之玉可以為國器孝悌之子可以為家瑞為政之要曰公與勤成家之道曰儉與清聞善言則拜告有過則喜非聖賢不能寳貨用之有盡忠孝享之無窮和以處衆寛以接下恕以待人君子人也坐宻室如通衢馭寸心如六馬可以免過䜛言巧佞言甘忠言直信言寡多言則背道多慾則傷生語人之短不曰直濟人之惡不曰義好勝者必争貪榮者必辱知足則樂務貪則憂好名則立異立異則身危故聖人以名為戒内睦者家道昌外睦者人事濟不匿人短不周人急非仁義人也心不清則無以見道志不確則無以立功結怨於人謂之種禍捨善不為謂之自賊諾輕者信必寡靣譽者背必非孝於親則子孝欽於人則衆欽聲色者敗德之具思慮者殘生之本為善不如捨惡救過不如省非欲不匱則博施欲長樂則守分廣積不如教子避禍不如省非勉强為善勝於因循為惡責人者不全交自恕者不改過自滿者敗自矜者愚自賊者忍多言獲利不如黙而無害寡言省謗寡慾保身行坦途者肆而忽故疾走則蹷行險途者畏而謹故徐歩則不跌然後知安樂有致死之道憂患為養生之本可不省諸太廟之犧被文繡而悔不及鷦鷯深林一枝之樂也廣積聚者遺子孫以禍害多聲色者殘性命以斤斧以衆資已者心逸而事濟以已禦衆者心勞而怨聚自信者人亦信之胡越猶弟兄自疑者人亦疑之身外皆敵國漁獵不同風舟車不並容飲食嗜好禮義貪殘四夷與中國殊若冰炭至於推誠則不欺守信則不疑非但六合之内可行動天地感鬼神非誠信不可為善如負重登山志雖確而力猶恐不及為惡如乗駿走坂雖不加鞭策而足亦不能制務名者殺其身多財者禍其後善惡報緩者非天網踈是欲成君子而㓕小人也禍福者天地所以愛人也如雷雨雪霜皆欲生成萬物故君子恐懼而畏小人僥倖而忽畏其禍則福生忽其福則禍至傳所謂禍福無門惟人自召也薄於所親而責人重者不可與言交好名欲速者不可與共謀貪而喜詐者不可與同利害忍而好勝者不可與同逸樂以忠沽名者訐以信沽名者詐以亷沽名者貪以潔沽名者汙忠信亷潔立身之本非釣名之具也有一於此鄉原之徒又何足取哉為已重者不仁好廣積者不義足恭者無禮貪名者無智功名官爵貨財聲色皆謂之欲俱可以殺身或聞之曰欲可去乎曰不可饑者欲食寒者欲衣無後者欲子孫是甘於自殺也然知足而不貪知節而不滛無沽名之心而不求功亦庻㡬乎欲可窒也立身之道内剛外柔肥家之道上遜下順不和不可以接物不容不可以馭下天下有甚於饑食渴飲之道而世或以名稱已或以為能事哀哉臣之忠子之孝弟之悌是也孔子以文學為孝悌之餘事孟子謂良知良能不出於學是非聖人强人以甚難耳豈愛欲汩其心而妻子爵禄為賊忠孝之具間有得臣子之道者宜乎表出於世苟以孔孟之道反求諸已則知捨孝悌不足以為人移孝悌為忠順則立身行已之道當然世或可稱已何能之有前輩論醫云閉門㸔古方三年知天下無病不可治及其出而用藥療疾知古今無方可用此無他聞見力極則止至於應變則無有窮盡噫豈但論醫也士之學問其失正在是苟以是心反之孳孳旦夜自不知為有餘縱未能盡愈天下之疾亦庻㡬乎十失二三也知不足者好學恥問者自滿一為君子一為小人自取如何耳不自重者取辱不自畏者招禍不自滿者受益不自是者博聞吉㓙悔吝自天然無有不由己者夀夭在天安危在人知天理者夭或可夀忽人事者雖安必危千斤之石置之立坂之上一力可以落九仭萬斛之舟溯於急流之中片㠶可以去千里勢使然也若馳羣馬於平陸集多士於大庭非駿足竒才不可得先人之有過失猶身之有疾病攻之以藥石誨之以㢘恥雖過失不害為賢者雖疾病不失為全人為善者不云利逐利者不見善舜跖之徒自此分捨生取義固不可得見利思義聖人亦取之殆哉不可言况可為乎孟子答梁惠王之言至矣口腹不節致疾之因念慮不正殺身之本驕富貴者戚戚安貧賤者休休所以景公千駟不及顔子之一瓢也外事無大小中慾無淺深有斷則生無斷則死大丈夫以斷為先人皆有好生惡死之心人皆有捨生取死之道何也見善不明耳教子弟無他術使耳所聞者善言目所見者善行善根於心則動容周旋無非善譬如胡越交居再世則語音變㓜則視父兄長則視朋友雖然善惡有種視先世如何耳有過能悔者不失為君子知過遂非者其小人歟官爵富貴在人謂之儻來道德行義在我謂之自得儻來者足以驕妻妾自得者可以輕公卿君子所以脩天爵而人爵從之事親有隐而無犯事君有犯而無隐事師無犯無隐聖人不易之論也古之所謂犯者以己所見而陳之於君不以犯上為犯也後世所謂犯者處卑位而言非其職徒以沽名之心務行其說直前詆訐無益於世愚以謂若能以事師之道事君無隐則不敢逄君之惡無犯則不忍暴君之失諫可行言可聽膏澤可下於民不亦美歟欲去病則正本本固則病可攻藥石可以效欲齊家則正身身端則家可理號令可以行固其本端其身非一朝一夕之事也事親孝者事君必忠何以知之良知固存雖妻子不能移其愛推此以盡為臣之道則爵禄安能易其守子惟知有親焉得不孝臣惟知有君安得不忠所以良知者其可忘乎父慈子孝兄友弟恭相須之理也然子不可待父慈而後孝弟不可待兄友而後恭譬猶責人以信然後報之以誠盡己之當為君子所以立身之道非求偹於人也以禮義為交際之道以亷恥為律己之法遊息於是朋友見欽而不敢欺妻子取法而不敢侮盡思患預防之理所以譬之四維其可廢而不張乎畋獵聲色之娯易而難反車服口體之奉相尚而無厭皆非逸豫安樂之道静吉動㐫德休偽拙聖人戒告甚切至反身而求樂莫大焉知此為君子昧此為小人恐懼者脩身之本事前而恐懼則畏畏可以免禍事後而恐懼則悔悔可以改過知者以畏消悔愚者無所畏而不知悔故智者保身愚者殺身大哉所謂恐懼也心可逸形不可不勞道可樂身不可不憂形不勞則怠惰易弊身不憂則荒淫不立故逸生於勞而嘗休樂生於憂而無厭是逸樂也憂勞其可㤀乎毁譽雜至觀其事則毁譽明善惡混淆公其心則善惡判此在上之職也若智効一官能効一職行其所當為而不問毁譽立乎其中道則善惡如白黑也古之人修身以避名今之人飾己以要譽所以古人臨大節而不奪今人見小利而易守君子人則不然無古無今無治無亂出則忠入則孝用則智捨則愚事親孝則專其愛而妻子不能移事君忠則盡其職而爵禄不能動竭力於親者不必湏士類致身於君者不必問品秩黼藻太平戡定禍亂可以謂之忠乎苟有隐於君不若愚下不欺之忠也列侯而封擊鮮而食可以謂之孝乎苟有違於親不若貧賤養志之孝也有聖賢之君無忠直之臣則聰明不能逹逺雖聖賢或可欺大哉所謂為君難財用足以富國家一夫可為風俗所以繫治亂非有位君子不能變必欲弭禍亂致太平非風俗淳儉不可愛君切者不知有富貴為己重者不能立功名木有所養則根本固而枝葉茂棟梁之材生水有所養則泉源壯而流𣲖長灌溉之利博人有所養則志氣大而識見明忠義之士出可不養哉故孟子所謂苟得其養無物不長也財不難聚也取予當則富足國不難治也邪正辨則丕平風不難化也自上及下而風行俗不難革也自邇及逺而俗變以愛妻子之心事親則曲盡其孝以保富貴之策奉君則無徃不忠以責人之心責己則寡過以恕己之心恕人則全交士大夫若止以一官之廩禄計則不知其為素餐請以驅役之卒奉承之吏供帳居處詳陳悉算則廪然如履氷岌然如臨淵有媿於方寸者多矣若於奉公治民之道不加思則竊人之財不足為盗矣堂下逺於千里况於九重之深雖堯舜不能知比屋有人能以所聞所見上體人君愛民求治之意委曲詳陳之則都俞之間可以弭禍亂不兵而致太平也以忠孝遺子孫者昌以智術遺子孫者亡以謙接物者强以善自衛者良爾謀不臧悔之何及爾見不長教之何益利心專則背道私意確則㓕公能自愛者未必能成人自欺者必㒺人能自儉者未必能周人自忍者必害人此無他為善難為惡易也子之事親不能承顔養志則必不能忠於君弟之事兄不能致恭盡禮則必不能遜於長上家不和無以見孝子國不亂無以見忠臣如是則孝子忠臣不容見於世也僕竊疑之有人能克諧六親欽順父母家不使不和莫大之孝也有人能引君當道將順正救國不使之亂莫大之忠也嘗謂風俗不淳儉則財用無豐足葢貴富者奢侈相尚奉養之外棄廢寳貨窮極土木惟務相勝貧賤者專於工巧伎藝古所未見一日之直可以獲農夫終嵗之利故棄本逐末耕桑者少而衣食者多求其盈餘儲積不亦難哉甲胄之士可以責以禦侮州縣之吏不過委以簿書事君而變薄俗非大有力者不可婦人悍者必淫醜者必妬如士大夫繆者忌險者疑必然之理也費萬金為一瞬之樂孰若散而活餒者㡬千百人處𦕈軀以廣厦何如庇寒士以一席之地乎知足者貧賤亦樂不知足者富貴亦憂夙興夜寐無非忠孝者人不知天必知之飽食暖衣恬然自衛者身雖安其如子孫何人之所以異於禽獸草木者以其有為耳皮毛齒角禽獸以用而名香味補㵼草木以功而著人之生也無德以表俗無功以及物曾禽獸草木之不若也哀哉噐滿則溢人滿則䘮用心專者雷霆不聞其響寒暑不知其勞為己重者不知富貴可以殺身功名可以及後行四通八達之衢者不迷思大公至正之道者不惑蠻夷不可以力勝而可以信服鬼神不可以情通而可以誠達况渉世與人為徒誠信其可捨諸嵗月己徃者不可復未來者不可期見在者不可失為善則善應為惡則惡報成名㓕身惟自取之以德遺後者昌以禍遺後者亡謙柔卑退者德之餘强忍姦詐者禍之始舜之所以為孝者有頑父嚚母傲弟人不幸而有此當克諧如舜不為甚難孟子曰舜何人也予何人也有為者亦若是韓非作說難而卒斃於說豈非所謂多言數窮之戒耶屈己者能處衆好勝者必遇敵欲常服者不争欲常樂者自足有限之噐投之滿盈則溢太虚之空物物自容静躁寛猛視量之如何耳張飽帆於大江驟駿馬於平陸天下之至快反思則憂處不争之地乘獨後之馬人或我嗤樂莫大焉勝於己者可師拙於己者可役愛於己者知善而不知惡憎於己者見惡而不見善强辨者飾非不知過之可改謙恭者無諍知善之可遷善惡在自為父子不相授堯為父而有丹朱舜為子而有瞽瞍堯與賢易舜克諧以孝難與善人交有終身了無所得者與不善人交動静語黙之間亦從而似之何耶人性如水為不善如就下交友之間安可不擇人之制性當如隄防之制水朝培暮植猶恐蟻漏之易壊若汎濫不固一傾而不可覆也近世士大夫多為子弟所累是溺於愛而甘受其謗殊不知父當不義聖人猶許子諍子弟不肖而不能令是納於邪而不知義方之訓也父兄之罪大矣綺語背道雜學亂性邪正者治亂之本賞罰者治亂之具舉正措邪賞善罰惡未有不治者邪正相雜賞罰不當求治亦難矣哉不臨難不見忠臣之心不趨利不知義士之節予奪者上之柄臣不得専賞罰者上之權其可私以循人乎天下有正道邪不可干以邪干正者國不治天下有公議私不可奪以私奪公者人弗服富貴在天取捨在人在天者聽在人者斷善良者聽之道謙損者斷之本富貴以道得伊尹是也貧賤以道守顔淵是也俱為聖為賢負鼎干湯與簞瓢陋巷勞逸憂樂不可同日而語也聖賢師心不師跡雖百世而道同後世師跡不師心雖時同而術異目主明五色可以盲其明耳主聰五音可以聾其聰非耳目之罪心不正則視聽狂聰不聰明不明也大則治亂邪正小則晝夜死生皆反手耳反邪則正反亂則治反夜則晝反死則生豈可猶豫苟且而為哉耳雖聞目不親見者不可從而言之流言可以惑衆若文其言而貽後世恐是非邪正失實憂國者不顧身愛民者不㒺上以是為非以非為是者强辯足以惑衆以無為有以有為無者便僻足以媚人心可欺天可欺乎君子獨立而持正故助之者鮮小人挾黨以濟私故從之者多君子周身以道小人周身以術憂天下國家者其慮深其志大其利博其言似迃其合亦寡其遇亦難吾孔孟是也趨㨗徑者不問大路喜佞言者不親正人得天地之至和者為君子故溫良慈儉秉隂陽之繆盭者為小人故凶詐奸邪重名節者識有餘而巧不足保富貴者智不足而才有餘智識明者君子才巧勝者小人善惡之性不可易如水不能燥火不能濕形色語黙之間善惡自見古之人孝弟力田行著於鄉州黨族名聞於朝故命之以官其臨民也安得不豈弟其從事也安得不服勞其事君也安得不忠愛身者所以孝於親愛民者所以忠於君高不可欺者天也尊不可欺者君也内不可欺者親也外不可欺者人也四者既不可欺心其可欺乎我心不欺人其欺我乎溺愛者受制於妻子患失者屈己於富貴大丈夫見善明故重名節於泰山用心剛故輕生死如鴻毛父善教子者教於孩提君善責臣者責於冗賤葢嗜慾可以奪孝富貴可以奪忠為善易避為善之名難不患人易案此句疑有脫文犯而不校難渉世應物有以横逆加我者譬由行草莽中荆棘之在衣徐行緩解而已所謂荆棘者亦何心哉如是則方寸不勞而怨可釋以言傷人者利如刀斧以術害人者毒如虎狼言不可不擇術不可不擇也古人畏四知者謂天地彼我必有一知者不得不畏况處八達之衢為萬目所視畏乎所當畏行乎所無畏可也誠無悔恕無怨和無仇忍無辱為子孫作富貴計者十敗其九為人作善方便者其後受惠耳不聞人之非目不視人之短口不言人之過庻㡬為君子為善不求人知者謂之隂德故其施廣其惠博天報必豐是故聖人惡要譽君子恥姑息仁言不如仁心之誠利近不如利逺之博仁言或失於口惠利近或㡬於姑息智大心勞者狂力小任重者踣知過之為過者恐懼不敢為不知過之為過者殺身而後已攫金於市者欲心勝而不知有羞惡求珠於淵者利心專而不顧其沉溺晝之所為夜必思之有善則樂有過則懼君子人也晝之所為夜不敢思行險蹈禍以苟僥倖其小人之徒歟沽虛譽於小人不若受之於天遺貨財於子孫不若周人之急私心勝者可以㓕公為己重者不知利物不欺不吝不隘不强者可與人為徒禮義亷耻可以律己不可以繩人律己則寡過繩人則寡合寡合則非渉世之道是故君子責己小人責人德有餘而為不足者謙財有餘而為不足者鄙愚勝智拙勝巧訥勝辯知此者全身昩此者蹈禍合天地者或不能周人情圖近利者必知其無逺慮塊土不能障狂瀾匹夫不能振頽俗蘇張通六國而皆合孔孟走天下而不遇易進難入王霸之道豈止如霄壤陶淵明無功德以及人而名節與古忠臣義士等何耶豈顔氏子以退為進寗武子愚不可及之徒歟巧辯者與道多悖拙訥者渉世必踈寜踈於世不可悖於道華藻見於外者謂之文今古積於中者謂之學苟見道不明用心不正徒只以文過飾非所以在德行言語政事之下求師問友急於教子弟者始於章句中於文彩終於科第所謂入孝出悌汎愛親仁則瞢然如𠖇行豈不違吾宣聖之言乎人性如水曲直方圓隨所寓善惡邪正隨所習富貴聲色皆就下不勞習者也若非見善明用心剛强忍力行則决堤壞防不流蕩者㡬希責越人以鞍馬强胡人以舟楫其猶詢民瘼於貴㳺索寳玩於寒士艱哉用不節財何以豐民不蘓國何以足君容而斷臣恪而忠父嚴而慈子孝而敬兄愛而訓弟恭而勞夫和而莊婦貞而順人倫之道盡矣處内以睦處外以義檢身以正交際以誠行己之道至矣飽藜莧者鄙膏粱樂貧賤者薄富貴安義命者輕死生逺是非者惡臧否不欺暗室者肯自欺於心乎不媿屋漏者肯有媿於人乎不欺於心無媿於人庻㡬可以希君子外重者内輕故保富貴而䘮名節内重者外輕故守道義而樂貧賤愛親者保其身愛君者輕其位飽肥甘衣輕暖不知節者損福廣積聚驕富貴不知止者殺身窮不易操達不患失非見善明用心剛者不能身之中有小疾痛則毉卜雜進愈而後已殊不知烹宰物命以快口腹豈不甚於己之疾痛乎戒之哉戒之哉人有過失己必知之己有過失豈不自知喜是非者檢人畏憂患者檢身人以巧勝天天以直勝人小人詐而巧似是而非故人悅之者衆君子誠而拙似迃而直故人知之者寡君子小人不並用如薰蕕不同噐用君子則逺小人用小人則害君子舜耕於歴山伊尹耕於莘野聖賢力田見於經傳後世以文學明道其弊至於菽麥不分豈止不知稼穡艱難也哀哉人以麟鳯比君子以豺狼比小人徒論其表耳麟鳯能瑞世而不能移風易俗君子能厚風俗致太平以來麟鳯豺狼能害人其狀易别人得以避之小人深情厚貌毒人而不可防閑豺狼之不若也善惡之報速則人畏而為善天網雖勿漏恐太踈則流中下之性少不勤苦老必艱辛少不伏勞老不安逸明出處者可以保身輕死生者可以守節梁棟朽者屋傾賢不肖分者國治上節下儉者財用足本重末輕者天下平輕財足以聚人律己足以服人量寛足以得人身先足以率人無常德者不可以作毉存亡所繫耳庸人假毉以自誣其初則要厚利虛實補㵼未必適當幸而不死則呼湏百出病者甘心以足其欲不幸而斃則曰飲食不知禁嗜欲不能節非藥之過也厚載而去死者何辜焉世無扁鵲望而知死生華佗滌腸而愈疾輕以性命託庸夫何如畏致疾之因固養其本以全天年耶嗚呼哀哉憂患疾痛皆養生善知識放逐閒廢皆仕宦善知識不有憂安知樂可為戒女相妬於室士相嫉於朝古今通患也若無貪榮擅寵之心何嫉妬之有情相親者禮必寡道相悖者術不同禮簡者誠術異者争人不可無識識暗者小人無識者禽獸小人捨正而趨邪假善而為惡識明者果如是乎禽獸不知父子之親君臣之分識安在哉利可共而不可獨謀可寡而不可衆獨利則敗衆謀則泄火之炎上水之就下順其性則烹飪之功成灌溉之利博越鳥巢南胡馬嘶北物之直情而况於人乎葢棺能定士之賢愚臨事能見人之操守食能止饑飲能止渴畏能止禍足能止貪猛虎能食人不幸而遇之必疾走以避小人能媚人人喜與之親不幸而同利害必巧為中傷毒人而人不知然機穽之設未若天網之勿漏也父之教子必以孝君之責臣必以忠子不子臣不臣安則為之以仁為宅以禮為門以義為路居處於是踐履於是安得不謂之君子仁義忠信本自修人必欽崇之放辟邪侈本自賊人必輕鄙之莫尊於事君莫嚴於事親莫逺於天地鬼神莫踈於禽獸夷狄一於誠則交際之道無不至矣内不欺於妻子者事親必孝外不欺於朋友者事君必忠人性如水水一傾則不可復性一縱則不可反制水者必以隄防制性者必以禮法保生者寡欲保身者避名無欲易無名難善人種德降祥於天惡人種禍貽殃於後妻子之書可以示朋友袵席之言可以白神明俯仰無媿君子之樂也以巧得者不肯以拙守巧過則失以力進者不肯以謙退力窮則墜人欲有所為不必謀於人當謀於心一人之心千萬人之心也若我心為可則人亦必以為可或人心有不可為者我豈可為耶孝弟忠信之在身猶金玉寳貨之在室擴而行之於己猶發而施之於人豈不美哉放棄而不知求埋藏而不知用是誰之過歟天下無甚難事若度己而取量才而授事㒺不濟若責聾者修聲瞽者司火非不為是不能也大匠掄材梁棟榱桷非一律良醫用藥温凉補㵼不槩用譬猶造屋瓦者不可為盤盂鑿柱礎者不可琢璞玉似是而非非工之過用者之不審也出必告反必面昏定晨省問寢視膳是人子之於親無頃刻㤀也今士大夫之家子弟㓜則視乳哺長則命師友非不愛也及其一命在身則挈妻携子從事於外以親為客寄父欲子之進而㤀其愛子欲自致顯宦而㤀其親是父不父子不子豈不為名教罪人求忠臣於孝子之門固不足誅賢父兄之過亦多矣用過其才則敗事享過其分則䘮身量有餘則不隘力有餘則不乏德有餘則不争色有餘則不妬用捨在人不在我行藏在我不在人在我者道在人者時言心聲也心正者言直心詖者言誕心不公者言不中理心誇大者言不究實事君如事父以實不以文以誠不以巧尊而畏之愛而敬之尊則不敢欺畏則不敢侮愛則不忍隐敬則不忍犯伊吕起耕釣傅說舉版築湯文高宗致治之本也漢高祖得先聖之心故用蕭何追亡臣為將削平禍亂與黼藻太平舉措不同欲飽暖者事農桑興王覇者圖秦晉農桑者衣食之本秦晉者兵馬之區臥重冰而厚䄄褥耽大慾而儲藥石知所患而不知所畏宴安之惑也不深耕易耨難以責天時不正心誠意難以服衆議有違於親者不足以言孝有欺於君者不足以言忠有慾者無剛有私者無斷養剛大之氣者不溺於富貴明取舍之義者不戚於貧賤然後可以斷大事立大節豈小丈夫所能鍜者夏不畏烈火漁者冬不畏寒氷好名者不顧安危耽欲者不顧生死貴賤有分大小有量分在天賤不能貴量在人小不能大君子修己以俟天小人怨天而不度己憂國者不謀身周人者不私己君子去取以是非小人毁譽以好惡君子合以同道小人合以附己事無大小理在其中當理者必能踐其言而卒於成理不當者雖詞窮力竭而終於有畫孝弟忠信立身之大本禮義亷耻行己之先務竊富貴以巧者甚於穿窬殘性命以慾者過於焚溺忠言似苦味之則有理㨗徑似直行之則背道忠言難於求知直道惟可行己藻嘗謂踐履之學見於日用其本在於正心誠意其效小用之以齊家大用之以治國平天下乃聖賢相授受之心法也河内李公太中先生著省心雜言一編以貽訓子孫始終不離乎孝弟忠信仁義道德之說踐履至到發而為言簡而有法與大學篇相表裏先生不以藻為愚暇日出所藏以相付授竊怪子房跪而進履老人夜半授以兵書未免教以殺人雖富貴可獵取非藻所願學焉是書也實聖賢心法所寓如老子之言道德聖人將有取焉乃刋而集之以公其傳吁今之學者文有餘而實不足涸源蹙本能踐其言者鮮矣微此書何以見聖賢之心法也夫門生右奉議郎權通判興元軍府主管學事兼管内勸農事賜緋魚袋馬藻䟦人有過己必知之己有過豈不自知喜是非者檢人畏憂患者檢身善哉言乎此省心之要法也李公生於太平之世富貴之家老於南遷之後故其所自得者如此嘉泰甲子二月戊午江陵項安世謹書君子之學必盡其心而後能知其性然心難盡也操則存舍則亡出入無時莫知其鄉可畏也哉今李氏之學省察之功見於日用者如此其殆庻㡬乎嘉定壬申嵗重陽節日荆江樂章書先大父敷文平居自號省心雜言一編皆箴規訓戒之辭耆岡兒童時尚及見其手藁板行于蜀名公鉅卿書其前後者非一士大夫愛重之以其本刋于池陽于新安皆以為大父之文也嘉定戊辰耆岡調官都城見書坊有刋小本鬻於市以為林和靖之作按和靖處士隐于西湖以詩名坡谷淮海皆稱道之設有此書諸公樂善好賢豈不揄揚而賛美之而和靖畧無一字自叙一以為品題者不知妄人俗子何所據而云然甚可怪也耆岡通守邵陽敬以舊本摹寫鋟木以廣其傳可以破流俗之惑使來世鶡冠晏子春秋之疑尚於是乎可攷嘉定壬申仲秋孫奉議郎通判邵州軍州兼管内勸農營田事賜緋魚袋權州事耆岡拜手謹識景初四世祖提刑敷文乃丞相文和公之介弟生長太平中更憂患禀賦厚而神氣正識見逺而界限明抱負偉而發舒竒經渉多而酬應定人不知其為貴人也是以仕建紹間歴事三朝險夷一節疊被玉音襃寵曰朕知卿所至有愛民之譽又曰卿平素愛民一時縉紳歆羡年踰耳順力上掛冠之請人以比漢二䟽優㳺林下夀踰八袠人以比洛中諸老晚年書所見於坐右凡數十條以訓子孫名曰省心雜言明白洞逹沉著痛快雜之語録中莫辨刋行已久景初王父通守古邵亦嘗鋟梓不自意萬里流落之餘徃蹇來連連山水郡唐韓昌黎劉賔客我宋濓溪周元公南軒張宣公或宦遊或客寄轍跡猶香膏馥沾匄士皆希古則是編又且鋟梓昔五峯胡先生論通書之指人見其書之約而不知其道之大見其文之質而不知其義之精見其言之澹而不知其味之長雜言以之東坡蘇先生作王氏三槐堂記嘉其四世孫鞏好德而文以世其家景初愧焉敷文公名與字及出處大槩見諸太史氏書墓今併刻之省心乃其道號文和公名邦彦擢進士第一實政和宰相云景定三年太嵗壬戌良月朔旦四世孫朝㪚郎知連州軍州事節制屯戍軍馬提舉民兵借紫李景初拜手謹䟦雜言共二百二十八條小子曾㞧復之熟之旦夕筮仕蒼梧在輿則見其倚於衡猶以六經佐三尺法下元日景初又識
